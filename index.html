<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爱知县 租房搜索</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-en">PREMIE</span>
        <span class="logo-sep">|</span>
        <span class="logo-ja">爱知县租房搜索</span>
      </div>
      <nav class="nav">
        <a href="#">按地区搜索</a>
        <a href="#">按车站搜索</a>
        <a href="#">联系我们</a>
      </nav>
    </div>
  </header>

  <!-- ヒーロー -->
  <section class="hero">
    <div class="hero-content">
      <p class="hero-sub">名古屋・爱知全域的租房信息</p>
      <h1 class="hero-title">在爱知县找到<br>您的理想住所</h1>
    </div>
  </section>

  <!-- 検索カード -->
  <section class="search-section">
    <div class="search-card">

      <!-- タブナビ -->
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="area">
          <span class="tab-icon">📍</span>按地区搜索
        </button>
        <button class="tab-btn" data-tab="station">
          <span class="tab-icon">🚃</span>按车站搜索
        </button>
      </div>

      <!-- ===== タブ1: エリアから探す ===== -->
      <div class="tab-panel" id="panel-area">
        <form id="areaForm">

          <!-- 市区町村 -->
          <div class="form-row form-row-1">
            <div class="form-group">
              <label for="areaCode">市区町村</label>
              <select id="areaCode">
                <option value="">▼ 请选择市区町村（不选 = 爱知县全域）</option>
                <optgroup label="── 名古屋市 ──">
                  <option value="名古屋市中区">名古屋市中区</option>
                  <option value="名古屋市千種区">名古屋市千種区</option>
                  <option value="名古屋市東区">名古屋市東区</option>
                  <option value="名古屋市西区">名古屋市西区</option>
                  <option value="名古屋市中村区">名古屋市中村区</option>
                  <option value="名古屋市昭和区">名古屋市昭和区</option>
                  <option value="名古屋市天白区">名古屋市天白区</option>
                  <option value="名古屋市港区">名古屋市港区</option>
                  <option value="名古屋市緑区">名古屋市緑区</option>
                  <option value="名古屋市瑞穂区">名古屋市瑞穂区</option>
                  <option value="名古屋市北区">名古屋市北区</option>
                  <option value="名古屋市南区">名古屋市南区</option>
                  <option value="名古屋市守山区">名古屋市守山区</option>
                  <option value="名古屋市名東区">名古屋市名東区</option>
                  <option value="名古屋市熱田区">名古屋市熱田区</option>
                  <option value="名古屋市中川区">名古屋市中川区</option>
                </optgroup>
                <optgroup label="── 爱知县其他地区 ──">
                  <option value="豊田市">豊田市</option>
                  <option value="一宮市">一宮市</option>
                  <option value="岡崎市">岡崎市</option>
                  <option value="春日井市">春日井市</option>
                  <option value="豊橋市">豊橋市</option>
                  <option value="刈谷市">刈谷市</option>
                  <option value="安城市">安城市</option>
                  <option value="豊川市">豊川市</option>
                  <option value="西尾市">西尾市</option>
                  <option value="大府市">大府市</option>
                  <option value="東海市">東海市</option>
                  <option value="知多市">知多市</option>
                  <option value="半田市">半田市</option>
                  <option value="小牧市">小牧市</option>
                  <option value="稲沢市">稲沢市</option>
                  <option value="日進市">日進市</option>
                  <option value="長久手市">長久手市</option>
                  <option value="北名古屋市">北名古屋市</option>
                  <option value="清須市">清須市</option>
                  <option value="あま市">あま市</option>
                  <option value="みよし市">みよし市</option>
                </optgroup>
                <optgroup label="── 岐阜县 ──">
                  <option value="岐阜市">岐阜市</option>
                  <option value="大垣市">大垣市</option>
                  <option value="多治見市">多治見市</option>
                  <option value="関市">関市</option>
                  <option value="中津川市">中津川市</option>
                  <option value="瑞浪市">瑞浪市</option>
                  <option value="羽島市">羽島市</option>
                  <option value="恵那市">恵那市</option>
                  <option value="美濃加茂市">美濃加茂市</option>
                  <option value="土岐市">土岐市</option>
                  <option value="各務原市">各務原市</option>
                  <option value="可児市">可児市</option>
                  <option value="瑞穂市">瑞穂市</option>
                  <option value="本巣市">本巣市</option>
                  <option value="山県市">山県市</option>
                  <option value="海津市">海津市</option>
                  <option value="岐南町">羽島郡岐南町</option>
                  <option value="笠松町">羽島郡笠松町</option>
                  <option value="養老町">養老郡養老町</option>
                  <option value="垂井町">不破郡垂井町</option>
                  <option value="神戸町">安八郡神戸町</option>
                  <option value="北方町">本巣郡北方町</option>
                  <option value="坂祝町">加茂郡坂祝町</option>
                  <option value="御嵩町">可児郡御嵩町</option>
                </optgroup>
                <optgroup label="── 三重县（爱知周边） ──">
                  <option value="桑名市">桑名市</option>
                  <option value="いなべ市">いなべ市</option>
                  <option value="四日市市">四日市市</option>
                  <option value="鈴鹿市">鈴鹿市</option>
                  <option value="亀山市">亀山市</option>
                  <option value="津市">津市</option>
                  <option value="松阪市">松阪市</option>
                  <option value="伊勢市">伊勢市</option>
                  <option value="鳥羽市">鳥羽市</option>
                  <option value="志摩市">志摩市</option>
                  <option value="名張市">名張市</option>
                  <option value="伊賀市">伊賀市</option>
                  <option value="木曽岬町">木曽岬町</option>
                  <option value="東員町">東員町</option>
                  <option value="菰野町">菰野町</option>
                  <option value="朝日町">朝日町</option>
                  <option value="川越町">川越町</option>
                  <option value="多気町">多気町</option>
                  <option value="明和町">明和町</option>
                  <option value="大台町">大台町</option>
                </optgroup>
              </select>
            </div>
          </div>

          <!-- 共通フィルタ -->
          <div class="form-row form-row-3">
            <div class="form-group">
              <label for="area-rentMax">租金上限</label>
              <select id="area-rentMax">
                <option value="">不限上限</option>
                <option value="4">〜4万円</option>
                <option value="5">〜5万円</option>
                <option value="6">〜6万円</option>
                <option value="7">〜7万円</option>
                <option value="8">〜8万円</option>
                <option value="10">〜10万円</option>
                <option value="15">〜15万円</option>
              </select>
            </div>
            <div class="form-group">
              <label for="area-layout">户型</label>
              <select id="area-layout">
                <option value="">不限</option>
                <option value="1K">1K</option>
                <option value="1DK">1DK</option>
                <option value="1LDK">1LDK</option>
                <option value="2LDK">2LDK</option>
                <option value="3LDK">3LDK</option>
              </select>
            </div>
            <div class="form-group">
              <label for="area-walk">距车站步行时间</label>
              <select id="area-walk">
                <option value="">不限</option>
                <option value="5">5分钟以内</option>
                <option value="10">10分钟以内</option>
                <option value="15">15分钟以内</option>
                <option value="20">20分钟以内</option>
              </select>
            </div>
          </div>

          <!-- こだわり条件 -->
          <div class="checks-row">
            <span class="checks-label">附加条件</span>
            <div class="checks-grid">
              <label class="check-item"><input type="checkbox" id="area-pet"> 可养宠物</label>
              <label class="check-item"><input type="checkbox" id="area-parking"> 有停车场</label>
              <label class="check-item"><input type="checkbox" id="area-autolock"> 自动门锁</label>
              <label class="check-item"><input type="checkbox" id="area-bath"> 浴室厕所分离</label>
              <label class="check-item"><input type="checkbox" id="area-foreigner"> 可外国人入住</label>
              <label class="check-item"><input type="checkbox" id="area-remote"> 支持远程看房・手续</label>
            </div>
          </div>

          <!-- 検索サイト選択 -->
          <div class="form-row form-row-1">
            <div class="form-group">
              <label for="area-site">搜索网站</label>
              <select id="area-site">
                <option value="suumo">SUUMO（默认）</option>
                <option value="homes">LIFULL HOME'S</option>
                <option value="athome">at home</option>
                <option value="chintai">チンタイ（CHINTAI）</option>
                <option value="google">Google 検索</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn-search">
            在 Google 上搜索租房信息 &nbsp;→
          </button>
        </form>
      </div>

      <!-- ===== タブ2: 駅から探す ===== -->
      <div class="tab-panel hidden" id="panel-station">
        <form id="stationForm">

          <!-- 路線・駅 -->
          <div class="form-row form-row-2">
            <div class="form-group">
              <label for="lineSelect">选择路线</label>
              <select id="lineSelect">
                <option value="">▼ 请选择路线</option>
              </select>
            </div>
            <div class="form-group">
              <label for="stationSelect">选择车站</label>
              <select id="stationSelect" disabled>
                <option value="">请先选择路线</option>
              </select>
            </div>
          </div>

          <!-- 共通フィルタ -->
          <div class="form-row form-row-3">
            <div class="form-group">
              <label for="st-rentMax">租金上限</label>
              <select id="st-rentMax">
                <option value="">不限上限</option>
                <option value="4">〜4万円</option>
                <option value="5">〜5万円</option>
                <option value="6">〜6万円</option>
                <option value="7">〜7万円</option>
                <option value="8">〜8万円</option>
                <option value="10">〜10万円</option>
                <option value="15">〜15万円</option>
              </select>
            </div>
            <div class="form-group">
              <label for="st-layout">户型</label>
              <select id="st-layout">
                <option value="">不限</option>
                <option value="1K">1K</option>
                <option value="1DK">1DK</option>
                <option value="1LDK">1LDK</option>
                <option value="2LDK">2LDK</option>
                <option value="3LDK">3LDK</option>
              </select>
            </div>
            <div class="form-group">
              <label for="st-walk">距车站步行时间</label>
              <select id="st-walk">
                <option value="">不限</option>
                <option value="5">5分钟以内</option>
                <option value="10">10分钟以内</option>
                <option value="15">15分钟以内</option>
                <option value="20">20分钟以内</option>
              </select>
            </div>
          </div>

          <!-- こだわり条件 -->
          <div class="checks-row">
            <span class="checks-label">附加条件</span>
            <div class="checks-grid">
              <label class="check-item"><input type="checkbox" id="st-pet"> 可养宠物</label>
              <label class="check-item"><input type="checkbox" id="st-parking"> 有停车场</label>
              <label class="check-item"><input type="checkbox" id="st-autolock"> 自动门锁</label>
              <label class="check-item"><input type="checkbox" id="st-bath"> 浴室厕所分离</label>
              <label class="check-item"><input type="checkbox" id="st-foreigner"> 可外国人入住</label>
              <label class="check-item"><input type="checkbox" id="st-remote"> 支持远程看房・手续</label>
            </div>
          </div>

          <!-- 検索サイト選択 -->
          <div class="form-row form-row-1">
            <div class="form-group">
              <label for="st-site">搜索网站</label>
              <select id="st-site">
                <option value="suumo">SUUMO（默认）</option>
                <option value="homes">LIFULL HOME'S</option>
                <option value="athome">at home</option>
                <option value="chintai">チンタイ（CHINTAI）</option>
                <option value="google">Google 検索</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn-search">
            在 Google 上搜索租房信息 &nbsp;→
          </button>
        </form>
      </div>

    </div><!-- /search-card -->
  </section>

  <!-- 案内メッセージ -->
  <section class="guide-section">
    <div class="guide-box">
      <p class="guide-icon">🔍</p>
      <p class="guide-title">请选择条件进行搜索</p>
      <p class="guide-sub">设置地区、车站、租金、户型等搜索条件，<br>点击按钮即可在 Google 上显示租房搜索结果。</p>
    </div>
  </section>

  <!-- フッター -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">PREMIE ESTATE</div>
      <p class="footer-copy">&copy; 2026 PREMIE ESTATE. 版权所有。</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
